<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人资料</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #e8f0fe;
        }
        .name {
            font-size: 26px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .intro {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .info-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #555;
            margin: 12px 0;
            font-size: 16px;
        }
        .social {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social a {
            color: #409eff;
            text-decoration: none;
            font-size: 14px;
        }
        .social a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像：把链接换成你的照片链接 -->
        
        <div class="name">何晋宁</div>
        

        <div class="info-item">电话：13829988325</div>
        <div class="info-item">邮箱：2753560376@sjtu.edu.cn</div>
        <div class="info-item">地址：中国 · 上海</div>
	<div class="info-item">浦江国际学院大一在读</div>

        
        </div>
    </div>
</body>
</html>
